# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"
  - "ChatGPT"

ai_usage_summary: |
  Gemini and ChatGPT were used as development assistants for architectural
  brainstorming, implementation guidance, debugging, code review, and
  documentation support. All core design decisions, feature engineering,
  ranking logic, experimentation, integration, testing, and final validation
  were performed through iterative human development. AI tools assisted the
  engineering workflow but did not autonomously produce the final solution.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Our ranker is a low-latency cascading pipeline utilizing deterministic filters 
  (hard-excluding service-only workers and 54 honeypot anomalies) followed by 
  a TF-IDF text matcher and multi-factor behavioral activity multipliers.

